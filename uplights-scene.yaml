alias: "Uplights: Holiday Scene Manager (Final Hardened)"
description: >-
  Applies specific effects based on date. Includes double-tap speed enforcement
  for UDP reliability. St. Patrick's Day green (Mar 14-17), warm white default.
triggers:
  - trigger: state
    entity_id:
      - light.uplight1
      - light.uplight2
      - light.uplight3
      - light.uplight4
      - light.wiz_par38
    to: "on"
    from:
      - unavailable
      - "off"
    for: "00:00:05"
  - trigger: time_pattern
    minutes: /15
conditions:
  - condition: state
    entity_id: sun.sun
    state: below_horizon
  - condition: or
    conditions:
      - condition: state
        entity_id: light.uplight1
        state: "on"
      - condition: state
        entity_id: light.uplight2
        state: "on"
      - condition: state
        entity_id: light.uplight3
        state: "on"
      - condition: state
        entity_id: light.uplight4
        state: "on"
actions:
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ now().month == 3 and now().day >= 14 and now().day <= 17 }}"
        sequence:
          - action: light.turn_on
            target:
              entity_id:
                - light.uplight1
                - light.uplight2
                - light.uplight3
                - light.uplight4
                - light.wiz_par38
            data:
              transition: 1
              brightness_pct: 100
              rgb_color: [0, 255, 0]
    default:
      - action: light.turn_on
        target:
          entity_id:
            - light.uplight1
            - light.uplight2
            - light.uplight3
            - light.uplight4
            - light.wiz_par38
        data:
          transition: 1
          brightness_pct: 100
          color_temp_kelvin: 2700
mode: restart
